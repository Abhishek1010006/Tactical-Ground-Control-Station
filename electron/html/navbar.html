<!-- Floating unhide buttons (visible when panels are collapsed) -->
  <button id="btn-unhide-left" class="collapse-btn float-unhide left" style="display:none;" title="Show Fleet Panel">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="9 18 15 12 9 6"></polyline>
    </svg>
  </button>
  <button id="btn-unhide-right" class="collapse-btn float-unhide right" style="display:none;"
    title="Show Tactical Panel">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>
<!-- ═══ LAYER 0: TITLEBAR & MAP ═══ -->
  <div class="titlebar">
    <div class="titlebar-text">SWARMGCS TACTICAL</div>
  </div>
  

  <!-- ═══ LAYER 1: TOP NAVBAR ═══ -->

          <path d="M2 17l10 5 10-5"></path>

    </div>

    <div class="nav-center">

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

      <div id="sys-armed" class="armed-count" style="font-size:11px;">

      <div style="display:flex; align-items:center; gap:8px;">
